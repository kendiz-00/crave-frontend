<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - CRAVE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #1a1a2e;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .confirmation-container {
            max-width: 600px;
            width: 100%;
            background: #16213e;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: scaleIn 0.5s ease-out;
        }

        .success-icon i {
            font-size: 50px;
            color: white;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .confirmation-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: #d4a574;
            margin-bottom: 10px;
        }

        .confirmation-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }

        .order-details {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .detail-value {
            font-weight: 600;
            color: #ffffff;
            font-size: 14px;
        }

        .order-number {
            color: #d4a574;
            font-size: 18px;
            font-weight: 700;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #d4a574, #c19660);
            color: #111;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 165, 116, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #d4a574;
            border: 2px solid #d4a574;
        }

        .btn-secondary:hover {
            background: rgba(212, 165, 116, 0.1);
        }

        .btn-ghost {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: none;
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .items-preview {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .items-preview h4 {
            color: #d4a574;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .item-preview {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 640px) {
            .confirmation-container {
                padding: 24px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="confirmation-container">
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>
        <h1 class="confirmation-title">Order Confirmed!</h1>
        <p class="confirmation-subtitle">Thank you for your order. We're preparing it now.</p>

        <div class="order-details">
            <div class="detail-row">
                <span class="detail-label">Order Number</span>
                <span class="detail-value order-number" id="orderNumber">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Payment Status</span>
                <span class="detail-value" style="color: #10b981;">Paid</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Estimated Delivery</span>
                <span class="detail-value" id="estimatedDelivery">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Delivery Address</span>
                <span class="detail-value" id="deliveryAddress">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Total Paid</span>
                <span class="detail-value" id="totalPaid">-</span>
            </div>

            <div class="items-preview">
                <h4>Items Ordered</h4>
                <div id="itemsList"></div>
            </div>
        </div>

        <div class="action-buttons">
            <a href="tracking.html" class="btn btn-primary">
                <i class="fas fa-map-marker-alt" style="margin-right: 8px;"></i>
                Track Order
            </a>
            <a href="menu.html" class="btn btn-secondary">
                <i class="fas fa-utensils" style="margin-right: 8px;"></i>
                Continue Shopping
            </a>
            <button class="btn btn-ghost" onclick="downloadReceipt()">
                <i class="fas fa-download" style="margin-right: 8px;"></i>
                Download Receipt
            </button>
        </div>
    </div>

    <script>
        // Load order details from URL parameters or localStorage
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('order_id');
            
            if (orderId) {
                loadOrderDetails(orderId);
            } else {
                // Try to get from localStorage
                const lastOrder = localStorage.getItem('lastOrder');
                if (lastOrder) {
                    const order = JSON.parse(lastOrder);
                    displayOrderDetails(order);
                }
            }
        });

        function loadOrderDetails(orderId) {
            // In production, this would fetch from API
            const orderData = localStorage.getItem(`order_${orderId}`);
            if (orderData) {
                displayOrderDetails(JSON.parse(orderData));
            }
        }

        function displayOrderDetails(order) {
            document.getElementById('orderNumber').textContent = order.orderNumber || order.id;
            document.getElementById('estimatedDelivery').textContent = order.estimatedDelivery || '30-45 minutes';
            document.getElementById('deliveryAddress').textContent = order.deliveryAddress || 'Pickup';
            document.getElementById('totalPaid').textContent = `GHS ${(order.total || 0).toFixed(2)}`;

            // Display items
            const itemsList = document.getElementById('itemsList');
            if (order.items && order.items.length > 0) {
                itemsList.innerHTML = order.items.map(item => `
                    <div class="item-preview">
                        <span>${item.name} x${item.quantity}</span>
                        <span>GHS ${(item.price * item.quantity).toFixed(2)}</span>
                    </div>
                `).join('');
            }
        }

        function downloadReceipt() {
            // Placeholder for receipt download
            alert('Receipt download feature coming soon!');
        }
    </script>
</body>
</html>
